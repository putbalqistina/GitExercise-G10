<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f3f4f6;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    /* Main container */
    .dashboard {
        width: 900px;
        background: white;
        border-radius: 15px;
        padding: 160px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        position: relative;
    }

    /* Topbar */
    .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
    }

    .topbar input {
        padding: 8px;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    /* Title */
    h1 {
        font-size: 20px;
        margin-bottom: 40px;
    }

    /* Card container */
    .cards {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
    }

    /* Card */
    .card {
        background: #e5e7eb;
        padding: 40px;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.3s;
    }

    .card:hover {
        background: #d1d5db;
        transform: translateY(-3px);
    }

    /* Floating button */
    .add-btn {
        position: absolute;
        bottom: 20px;
        right: 20px;
        width: 45px;
        height: 45px;
        border-radius: 50%;
        background: #14532d;
        color: white;
        border: none;
        font-size: 20px;
        cursor: pointer;
    }

    .add-btn:hover {
        background: #166534;
    }

</style>
</head>

<body>

<div class="dashboard">

    <!-- Topbar -->
    <div class="topbar">
        <div>AssignMate</div>
        <input type="text" placeholder="Search 🔍︎">
        <div>Notifications | Filter</div>
    </div>


    <!-- Title -->
    <h1>Your Name's Dashboard</h1>

    <!-- Cards -->
    <div class="cards">
        <div class="card">CSP1123 - Mini IT Project</div>
        <div class="card">CDS1114 - Introduction to Digital Systems</div>
        <div class="card">CMT1134 - Mathematics III</div>
        <div class="card">LCT1113 - Critical Thinking</div>
    </div>

    <!-- Add Button -->
    <button class="add-btn">+</button>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f3f4f6;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    /*Main container*/
    .dashboard {
        width: 900px;
        background: white;
        border-radius: 15px;
        padding: 160px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        position: relative;
    }

    /*Topbar*/
    .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
    }

    .topbar input {
        padding: 8px;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    /*Title*/
    h1 {
        font-size: 20px;
        margin-bottom: 40px;
    }

    /*Card container*/
    .cards {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
    }

    /*Card*/
    .card {
        background: #e5e7eb;
        padding: 40px;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.3s;
        min-height: 200px;

    }

    .card:hover {
        background: #d1d5db;
        transform: translateY(-3px);
    }

    /*Floating button*/
    .add-btn {
        position: absolute;
        bottom: 20px;
        right: 20px;
        width: 45px;
        height: 45px;
        border-radius: 50%;
        background: #14532d;
        color: white;
        border: none;
        font-size: 20px;
        cursor: pointer;
    }

    .add-btn:hover {
        background: #166534;
    }

</style>
</head>

<body>

<div class="dashboard">

    <!--topbar-->
    <div class="topbar">
        <div>AssignMate</div>
        <input type="text" placeholder="Search 🔍︎">
        <div>Notifications | Filter</div>
        <div>🌣</div>
    </div>


    <!--title-->
    <h1>LCT 1113 - Critical Thinking's Assignments</h1>

    <!--cards-->
    <div class="cards">
        <div class="card">Blended Learning Week 2</div>
        <div class="card">20% Presentation</div>
        <div class="card">Debate Points</div>
    </div>

    <!--Addbutton-->
    <button class="add-btn">+</button>

</div>

</body>
</html>

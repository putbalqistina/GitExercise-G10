<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
</head>

<body>

    
<button class="add-btn" onclick="window.location.href='/add_assignment'">+</button>
<div class="dashboard">

    <!-- Topbar -->
    <div class="topbar">
        <div>AssignMate</div>
        <input type="text" placeholder="Search 🔍︎">
        <div>Notifications | Filter</div>
        <div class="settings-link">
        <a href="/edit_profile" style="text-decoration: none; cursor: pointer;">
            🌣
        </a>
    </div>
    </div>

    <!-- Title -->
    <h1>Your Dashboard</h1>

    <!-- Cards -->
    <div class="cards">
     {%if subjects %}
        {% for subject in subjects %}
            <a href="/subject/{{ subject.code }}">
                <div class="card">
                    {{ subject.code }} - {{ subject.name }}
                </div>
            </a>
        {% endfor %}
        {% else %}
        <p> No Assignments yet. Click + to add.</p>
        {% endif %}
    </div>

</div>

</body>
</html>
